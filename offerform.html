<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Offers - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f0f4f8; min-height: 100vh; }

.top-bar {
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
}
.top-bar h1 { font-size: 1.4rem; font-weight: 700; }
.top-bar a {
    color: white; text-decoration: none;
    background: rgba(255,255,255,0.2);
    padding: 0.5rem 1rem; border-radius: 8px;
    font-size: 0.9rem; transition: background 0.2s;
}
.top-bar a:hover { background: rgba(255,255,255,0.35); }

.main-wrap {
    max-width: 1150px; margin: 2rem auto;
    padding: 0 1.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
}

/* ── Form Card ── */
.form-card {
    background: white; border-radius: 16px;
    padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}
.form-card h2 {
    font-size: 1.25rem; color: #1e293b;
    margin-bottom: 1.4rem; padding-bottom: 0.75rem;
    border-bottom: 2px solid #e2e8f0;
    display: flex; align-items: center; gap: 0.6rem;
}
.form-card h2 i { color: #2563eb; }

.form-group { margin-bottom: 1.1rem; }
.form-group label {
    display: block; font-size: 0.85rem;
    font-weight: 600; color: #475569; margin-bottom: 0.35rem;
}
.form-group input,
.form-group select,
.form-group textarea {
    width: 100%; padding: 0.72rem 1rem;
    border: 1.5px solid #e2e8f0; border-radius: 10px;
    font-size: 0.93rem; font-family: 'Inter', sans-serif;
    color: #1e293b; background: #f8fafc;
    transition: border 0.2s, box-shadow 0.2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none; border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    background: white;
}
.form-group textarea { resize: vertical; min-height: 85px; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

/* ── Image Upload Toggle ── */
.img-toggle-wrap {
    display: flex; gap: 0.5rem; margin-bottom: 0.75rem;
}
.img-toggle-btn {
    flex: 1; padding: 0.55rem;
    border: 2px solid #e2e8f0; border-radius: 8px;
    background: white; color: #64748b;
    font-size: 0.82rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; text-align: center;
}
.img-toggle-btn.active {
    border-color: #2563eb; background: #eff6ff; color: #2563eb;
}

.img-input-section { display: none; }
.img-input-section.visible { display: block; }

/* Custom file pick */
.file-drop-area {
    border: 2px dashed #cbd5e1; border-radius: 10px;
    padding: 1.4rem; text-align: center; cursor: pointer;
    transition: border 0.2s, background 0.2s;
    background: #f8fafc;
}
.file-drop-area:hover { border-color: #2563eb; background: #eff6ff; }
.file-drop-area i { font-size: 2rem; color: #94a3b8; margin-bottom: 0.5rem; display: block; }
.file-drop-area p { font-size: 0.85rem; color: #64748b; }
.file-drop-area input[type="file"] { display: none; }

/* Image preview */
.img-preview-wrap {
    margin-top: 0.75rem; display: none;
    align-items: center; gap: 0.75rem;
}
.img-preview-wrap.visible { display: flex; }
.img-preview-wrap img {
    width: 80px; height: 60px;
    object-fit: cover; border-radius: 8px;
    border: 2px solid #e2e8f0;
}
.img-preview-wrap span { font-size: 0.8rem; color: #64748b; flex: 1; word-break: break-all; }
.img-preview-wrap button {
    background: #fee2e2; color: #dc2626; border: none;
    border-radius: 6px; padding: 0.35rem 0.65rem;
    cursor: pointer; font-size: 0.8rem; width: auto;
}

/* Progress bar */
.upload-progress {
    height: 6px; background: #e2e8f0;
    border-radius: 3px; overflow: hidden;
    margin-top: 0.5rem; display: none;
}
.upload-progress-bar {
    height: 100%; background: linear-gradient(90deg, #2563eb, #60a5fa);
    width: 0%; transition: width 0.3s;
}

.submit-btn {
    width: 100%; padding: 0.9rem;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white; border: none; border-radius: 10px;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex; justify-content: center; align-items: center; gap: 0.5rem;
}
.submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37,99,235,0.3); }
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.success-msg {
    background: #dcfce7; color: #166534;
    border: 1px solid #86efac; padding: 0.8rem 1rem;
    border-radius: 10px; margin-top: 1rem;
    display: none; text-align: center; font-weight: 600;
}

/* ── List Card ── */
.list-card {
    background: white; border-radius: 16px;
    padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    max-height: 88vh; overflow-y: auto;
}
.list-card h2 {
    font-size: 1.25rem; color: #1e293b;
    margin-bottom: 1.1rem; padding-bottom: 0.7rem;
    border-bottom: 2px solid #e2e8f0;
    display: flex; align-items: center; gap: 0.6rem;
    position: sticky; top: 0; background: white; z-index: 2; padding-top: 0.4rem;
}
.list-card h2 i { color: #ef4444; }

.filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.1rem; flex-wrap: wrap; }
.filter-tab {
    padding: 0.38rem 1rem; border-radius: 20px; border: none;
    font-size: 0.82rem; font-weight: 600; cursor: pointer;
    background: #f1f5f9; color: #64748b; transition: all 0.2s;
}
.filter-tab.active { background: #2563eb; color: white; }

/* Offer Item */
.offer-item {
    display: flex; gap: 1rem; align-items: flex-start;
    padding: 1rem; border-radius: 12px;
    border: 1.5px solid #e2e8f0; margin-bottom: 1rem;
    transition: border 0.2s;
}
.offer-item:hover { border-color: #93c5fd; }
.offer-thumb {
    width: 88px; height: 66px; object-fit: cover;
    border-radius: 8px; flex-shrink: 0; background: #f1f5f9;
}
.offer-info { flex: 1; min-width: 0; }
.offer-info h4 { font-size: 0.93rem; color: #1e293b; font-weight: 700; }
.offer-meta { font-size: 0.78rem; color: #64748b; margin: 0.2rem 0 0.3rem; }
.offer-price-line { font-size: 0.88rem; font-weight: 700; color: #2563eb; }
.offer-badge {
    display: inline-block; padding: 0.18rem 0.55rem;
    border-radius: 10px; font-size: 0.7rem; font-weight: 700; margin-right: 0.25rem;
}
.badge-electric { background: #dcfce7; color: #15803d; }
.badge-premium  { background: #fef3c7; color: #b45309; }
.badge-offer    { background: #fee2e2; color: #b91c1c; }

/* DELETE button — clearly visible */
.delete-offer-btn {
    background: #ef4444; color: white;
    border: none; border-radius: 8px;
    padding: 0.5rem 0.8rem;
    cursor: pointer; font-size: 0.8rem; font-weight: 600;
    display: flex; align-items: center; gap: 0.35rem;
    flex-shrink: 0; transition: background 0.2s, transform 0.15s;
    align-self: flex-start; margin-top: 0.2rem;
}
.delete-offer-btn:hover { background: #dc2626; transform: translateY(-1px); }

.empty-state { text-align: center; padding: 3rem 1rem; color: #94a3b8; }
.empty-state i { font-size: 2.8rem; display: block; margin-bottom: 0.75rem; }
.loading-spinner { text-align: center; padding: 2rem; color: #94a3b8; }

@media (max-width: 768px) {
    .main-wrap { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="top-bar">
    <h1><i class="fas fa-tags"></i> Manage Bike Offers</h1>
    <a href="admin.html"><i class="fas fa-arrow-left"></i> Back to Admin</a>
</div>

<div class="main-wrap">

    <!-- ── ADD OFFER FORM ── -->
    <div class="form-card">
        <h2><i class="fas fa-plus-circle"></i> Add New Offer</h2>

        <div class="form-group">
            <label>Bike Name *</label>
            <input type="text" id="bikeName" placeholder="e.g. Ola S1 Pro, Royal Enfield Classic 350">
        </div>

        <div class="form-group">
            <label>Category *</label>
            <select id="categorySelect">
                <option value="">-- Select Category --</option>
                <option value="electric">⚡ Electric Bike / Scooty</option>
                <option value="premium">👑 Premium Bike (5 Lakh+)</option>
                <option value="offer">🔥 Special Offer / Discount</option>
            </select>
        </div>

        <!-- IMAGE: toggle between Upload & URL -->
        <div class="form-group">
            <label>Bike Image *</label>
            <div class="img-toggle-wrap">
                <button type="button" class="img-toggle-btn active" id="tabUpload" onclick="switchImgTab('upload')">
                    <i class="fas fa-cloud-upload-alt"></i> Upload File
                </button>
                <button type="button" class="img-toggle-btn" id="tabUrl" onclick="switchImgTab('url')">
                    <i class="fas fa-link"></i> Paste URL
                </button>
            </div>

            <!-- File Upload -->
            <div class="img-input-section visible" id="sectionUpload">
                <div class="file-drop-area" id="dropArea" onclick="document.getElementById('imgFileInput').click()">
                    <i class="fas fa-image"></i>
                    <p>Click to pick an image <br><span style="color:#94a3b8;font-size:0.78rem">JPG, PNG, WEBP up to 10MB</span></p>
                    <input type="file" id="imgFileInput" accept="image/*" onchange="handleFileSelect(event)">
                </div>
                <div class="upload-progress" id="uploadProgress">
                    <div class="upload-progress-bar" id="uploadProgressBar"></div>
                </div>
            </div>

            <!-- URL input -->
            <div class="img-input-section" id="sectionUrl">
                <input type="url" id="bikeImageUrl" placeholder="https://... (paste image link)">
            </div>

            <!-- Preview -->
            <div class="img-preview-wrap" id="imgPreviewWrap">
                <img id="imgPreviewEl" src="" alt="preview">
                <span id="imgPreviewName">image.jpg</span>
                <button type="button" onclick="clearImage()"><i class="fas fa-times"></i></button>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Original Price (₹) *</label>
                <input type="number" id="originalPrice" placeholder="e.g. 150000">
            </div>
            <div class="form-group">
                <label>Offer Price (₹)</label>
                <input type="number" id="offerPrice" placeholder="e.g. 130000">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Discount %</label>
                <input type="number" id="discount" placeholder="e.g. 12" min="0" max="100">
            </div>
            <div class="form-group">
                <label>Brand</label>
                <input type="text" id="brand" placeholder="e.g. Ola, Ather, Harley">
            </div>
        </div>

        <div class="form-group">
            <label>Key Specs <span style="color:#94a3b8;font-weight:400">(comma separated)</span></label>
            <input type="text" id="specs" placeholder="e.g. 0-40 in 2.9s, 125km range, 8.5kW motor">
        </div>

        <div class="form-group">
            <label>Short Description</label>
            <textarea id="description" placeholder="Brief description of the bike and why it's a great deal..."></textarea>
        </div>

        <div class="form-group">
            <label>Offer Valid Till</label>
            <input type="date" id="validTill">
        </div>

        <button class="submit-btn" id="submitBtn" onclick="addOffer()">
            <i class="fas fa-plus"></i> Add Offer
        </button>
        <div class="success-msg" id="successMsg">
            <i class="fas fa-check-circle"></i> Offer added successfully!
        </div>
    </div>

    <!-- ── OFFERS LIST ── -->
    <div class="list-card">
        <h2><i class="fas fa-list"></i> Current Offers</h2>

        <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterOffers('all', this)">All</button>
            <button class="filter-tab" onclick="filterOffers('electric', this)">⚡ Electric</button>
            <button class="filter-tab" onclick="filterOffers('premium', this)">👑 Premium</button>
            <button class="filter-tab" onclick="filterOffers('offer', this)">🔥 Special</button>
        </div>

        <div id="offersList">
            <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading offers...</div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, orderBy, query, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAhWXQg6VYvz8JcrPu42Y__oGkARfi0x1U",
    authDomain: "bikeroom-765b8.firebaseapp.com",
    projectId: "bikeroom-765b8",
    storageBucket: "bikeroom-765b8.appspot.com",
    appId: "1:505548164349:web:6f1111e3b71f5643ca0294"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── Cloudinary config ──────────────────────────────────────────
const CLOUD_NAME    = "dvxnmsryu";
const UPLOAD_PRESET = "bike_upload";

let allOffers     = [];
let currentFilter = 'all';
let uploadedImageUrl = '';
let currentImgTab    = 'upload';

// ── IMAGE TAB SWITCH ──────────────────────────────────────────
window.switchImgTab = function(tab) {
    currentImgTab = tab;
    document.getElementById('tabUpload').classList.toggle('active', tab === 'upload');
    document.getElementById('tabUrl').classList.toggle('active', tab === 'url');
    document.getElementById('sectionUpload').classList.toggle('visible', tab === 'upload');
    document.getElementById('sectionUrl').classList.toggle('visible', tab === 'url');
    clearImage();
};

// ── FILE SELECT → Cloudinary upload ───────────────────────────
window.handleFileSelect = async function(event) {
    const file = event.target.files[0];
    if (!file) return;

    const progress  = document.getElementById('uploadProgress');
    const bar       = document.getElementById('uploadProgressBar');
    const dropArea  = document.getElementById('dropArea');

    progress.style.display = 'block';
    bar.style.width = '10%';
    dropArea.innerHTML = `<i class="fas fa-spinner fa-spin" style="font-size:1.5rem;color:#2563eb"></i><p style="color:#2563eb;font-weight:600">Uploading to Cloudinary...</p>`;

    try {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);

        bar.style.width = '40%';
        const res  = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
        bar.style.width = '90%';
        const data = await res.json();

        if (!data.secure_url) throw new Error('Upload failed: ' + (data.error?.message || 'Unknown'));

        uploadedImageUrl = data.secure_url;
        bar.style.width = '100%';
        setTimeout(() => { progress.style.display = 'none'; bar.style.width = '0%'; }, 600);

        showImgPreview(data.secure_url, file.name);
        dropArea.innerHTML = `<i class="fas fa-check-circle" style="font-size:1.5rem;color:#16a34a"></i><p style="color:#16a34a;font-weight:600">Uploaded! Click to change</p><input type="file" id="imgFileInput" accept="image/*" onchange="handleFileSelect(event)">`;

    } catch(err) {
        progress.style.display = 'none';
        bar.style.width = '0%';
        dropArea.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ef4444"></i><p style="color:#ef4444">Upload failed. Try again.</p><input type="file" id="imgFileInput" accept="image/*" onchange="handleFileSelect(event)" style="display:none">`;
        alert('Cloudinary upload error: ' + err.message);
    }
};

function showImgPreview(url, name) {
    const wrap = document.getElementById('imgPreviewWrap');
    document.getElementById('imgPreviewEl').src = url;
    document.getElementById('imgPreviewName').textContent = name || url.split('/').pop();
    wrap.classList.add('visible');
}

window.clearImage = function() {
    uploadedImageUrl = '';
    document.getElementById('imgPreviewWrap').classList.remove('visible');
    document.getElementById('imgPreviewEl').src = '';
    document.getElementById('bikeImageUrl').value = '';
    // reset drop area
    document.getElementById('dropArea').innerHTML = `
        <i class="fas fa-image"></i>
        <p>Click to pick an image <br><span style="color:#94a3b8;font-size:0.78rem">JPG, PNG, WEBP up to 10MB</span></p>
        <input type="file" id="imgFileInput" accept="image/*" onchange="handleFileSelect(event)">`;
};

// ── ADD OFFER ─────────────────────────────────────────────────
window.addOffer = async function() {
    const name          = document.getElementById('bikeName').value.trim();
    const category      = document.getElementById('categorySelect').value;
    const originalPrice = document.getElementById('originalPrice').value;
    const offerPrice    = document.getElementById('offerPrice').value;
    const discount      = document.getElementById('discount').value;
    const specs         = document.getElementById('specs').value.trim();
    const description   = document.getElementById('description').value.trim();
    const brand         = document.getElementById('brand').value.trim();
    const validTill     = document.getElementById('validTill').value;

    // resolve image URL
    let imageUrl = '';
    if (currentImgTab === 'upload') {
        imageUrl = uploadedImageUrl;
    } else {
        imageUrl = document.getElementById('bikeImageUrl').value.trim();
        if (imageUrl) showImgPreview(imageUrl, imageUrl.split('/').pop());
    }

    if (!name || !category || !originalPrice || !imageUrl) {
        alert('Please fill: Bike Name, Category, Original Price and upload/paste an Image.');
        return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

    try {
        await addDoc(collection(db, "bikeOffers"), {
            name, category,
            originalPrice : Number(originalPrice),
            offerPrice    : offerPrice ? Number(offerPrice) : null,
            discount      : discount   ? Number(discount)   : null,
            imageUrl, specs, description, brand, validTill,
            createdAt: serverTimestamp()
        });

        // clear form
        ['bikeName','originalPrice','offerPrice','discount','specs','description','brand','validTill']
            .forEach(id => document.getElementById(id).value = '');
        document.getElementById('categorySelect').value = '';
        clearImage();

        const msg = document.getElementById('successMsg');
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 3000);
        // ✅ onSnapshot handles list update automatically — no reload needed

    } catch(e) { alert('Error saving: ' + e.message); }

    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-plus"></i> Add Offer';
};

// REAL-TIME: no reload needed
const offersQuery = query(collection(db, "bikeOffers"), orderBy("createdAt", "desc"));
onSnapshot(offersQuery, (snapshot) => {
    allOffers = [];
    snapshot.forEach(d => allOffers.push({ id: d.id, ...d.data() }));
    renderOffers(currentFilter);
}, (err) => {
    document.getElementById('offersList').innerHTML =
        `<p style="color:#ef4444;text-align:center;padding:1rem">⚠️ Error: ${err.message}</p>`;
});

function renderOffers(filter) {
    const list     = document.getElementById('offersList');
    const filtered = filter === 'all' ? allOffers : allOffers.filter(o => o.category === filter);

    if (!filtered.length) {
        list.innerHTML = `<div class="empty-state"><i class="fas fa-tags"></i><p>No offers here yet.</p></div>`;
        return;
    }

    list.innerHTML = filtered.map(offer => {
        const cat = offer.category;
        const catLabel = cat === 'electric' ? '⚡ Electric' : cat === 'premium' ? '👑 Premium' : '🔥 Special';
        const priceHTML = offer.offerPrice
            ? `<span style="text-decoration:line-through;color:#94a3b8;font-size:0.78rem">₹${Number(offer.originalPrice).toLocaleString('en-IN')}</span>
               <strong style="color:#2563eb;margin-left:4px">₹${Number(offer.offerPrice).toLocaleString('en-IN')}</strong>`
            : `<strong style="color:#2563eb">₹${Number(offer.originalPrice).toLocaleString('en-IN')}</strong>`;
        return `
        <div class="offer-item" id="item-${offer.id}">
            <img class="offer-thumb"
                 src="${offer.imageUrl || 'https://via.placeholder.com/88x66?text=Bike'}"
                 onerror="this.src='https://via.placeholder.com/88x66?text=Bike'"
                 alt="${offer.name}">
            <div class="offer-info">
                <h4>${offer.name}</h4>
                <div class="offer-meta">
                    <span class="offer-badge badge-${cat}">${catLabel}</span>
                    ${offer.discount ? `<span class="offer-badge badge-offer">${offer.discount}% OFF</span>` : ''}
                    ${offer.brand    ? `<span>${offer.brand}</span>` : ''}
                </div>
                <div class="offer-price-line">${priceHTML}</div>
                ${offer.specs    ? `<div style="font-size:0.76rem;color:#64748b;margin-top:0.25rem">${offer.specs}</div>` : ''}
                ${offer.validTill? `<div style="font-size:0.73rem;color:#f59e0b;margin-top:0.2rem"><i class="fas fa-clock"></i> Valid till: ${offer.validTill}</div>` : ''}
            </div>
            <button class="delete-offer-btn" onclick="deleteOffer('${offer.id}', '${offer.name.replace(/'/g,"\\'")}')">
                <i class="fas fa-trash-alt"></i> Delete
            </button>
        </div>`;
    }).join('');
}

// ── DELETE OFFER ──────────────────────────────────────────────
window.deleteOffer = async function(id, name) {
    if (!confirm(`Remove offer "${name}" from the website?`)) return;
    try {
        await deleteDoc(doc(db, "bikeOffers", id));
        // onSnapshot fires automatically — list updates instantly
    } catch(e) {
        alert('Delete error: ' + e.message);
    }
};

// ── FILTER ────────────────────────────────────────────────────
window.filterOffers = function(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderOffers(filter);
};
</script>

</body>
</html>
