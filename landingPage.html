<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeedX Landing</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial,sans-serif; }
.bgImage {
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    object-fit: cover;
    z-index:-1;
}
.overlay {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.4);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    font-size:2rem;
}
</style>
</head>
<body>

<img id="bgImage" class="bgImage" src="" alt="Landing Background">

<div class="overlay">
    <h1>Welcome to SpeedX</h1>
    <p>Loading...</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔹 Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyAhWXQg6VYvz8JcrPu42Y__oGkARfi0x1U",
    authDomain: "bikeroom-765b8.firebaseapp.com",
    projectId: "bikeroom-765b8",
    storageBucket: "bikeroom-765b8.appspot.com",
    appId: "1:505548164349:web:6f1111e3b71f5643ca0294"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔹 Fetch image URL from Firestore
async function fetchLandingImage(){
    try {
        const docRef = doc(db,"animations","current");
        const docSnap = await getDoc(docRef);
        if(docSnap.exists() && docSnap.data().url){
            const img = document.getElementById("bgImage");
            img.src = docSnap.data().url;
        } else {
            console.log("No image found in Firestore");
        }
    } catch(err){
        console.error("Error fetching image:", err);
    }
}

fetchLandingImage();

// 🔹 3 second wait + Auth check
setTimeout(()=>{
    onAuthStateChanged(auth, (user)=>{
        if(user){
            window.location.href = "HomePage.html"; // Login ahe
        } else {
            window.location.href = "register.html";   // Login nahi
        }
    });
}, 3000); // 3 sec
</script>

</body>
</html>
