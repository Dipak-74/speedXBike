<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedX - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #10b981;
            --text-color: #1e293b;
            --text-light: #64748b;
            --background: #f8fafc;
            --card-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
        }

        .profile-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        .profile-header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 50%, #2563eb 100%);
            padding: 3.5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .profile-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 25px 25px;
            opacity: 0.4;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: white;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .profile-pic:hover {
            transform: scale(1.05);
        }

        .profile-pic i {
            font-size: 4rem;
            color: var(--primary-color);
        }

        .profile-header h1 {
            color: white;
            font-size: 1.9rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .profile-header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
        }

        .profile-content {
            padding: 2rem;
        }

        .info-section {
            margin-bottom: 2rem;
        }

        .info-section h2 {
            color: var(--text-color);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary-color);
            display: inline-block;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .info-item {
            background: var(--background);
            padding: 1.5rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .info-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .info-icon {
            width: 50px;
            height: 50px;
            background: var(--primary-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }

        .info-content {
            flex: 1;
        }

        .info-label {
            display: block;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .info-value {
            color: var(--text-color);
            font-size: 1.1rem;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 2rem;
        }

        .button-group button {
            flex: 1;
            min-width: 200px;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .button-group button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .button-group button.cart-btn {
            background: var(--secondary-color);
            color: white;
        }

        .button-group button.cart-btn:hover {
            background: #059669;
        }

        .button-group button.edit-btn {
            background: var(--primary-color);
            color: white;
        }

        .button-group button.edit-btn:hover {
            background: #1e40af;
        }

        .button-group button.logout-btn {
            background: #ef4444;
            color: white;
        }

        .button-group button.logout-btn:hover {
            background: #dc2626;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media(max-width:768px) {
            .container {
                padding: 1rem;
            }

            .profile-header {
                padding: 2rem 1rem;
            }

            .profile-pic {
                width: 120px;
                height: 120px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .button-group button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-pic"><i class="fas fa-user"></i></div>
                <h1 id="userName">User Profile</h1>
                <p>Welcome to your personal dashboard</p>
            </div>
            <div class="profile-content">
                <div class="info-section">
                    <h2>Personal Information</h2>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-icon"><i class="fas fa-user"></i></div>
                            <div class="info-content">
                                <span class="info-label">Full Name</span>
                                <span class="info-value" id="nameValue"></span>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-icon"><i class="fas fa-envelope"></i></div>
                            <div class="info-content">
                                <span class="info-label">Email Address</span>
                                <span class="info-value" id="emailValue"></span>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-icon"><i class="fas fa-phone"></i></div>
                            <div class="info-content">
                                <span class="info-label">Phone Number</span>
                                <span class="info-value" id="phoneValue"></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="button-group">
                    <button class="cart-btn" id="cartBtn"><i class="fas fa-shopping-cart"></i> View Cart</button>
                    <button class="edit-btn" id="editBtn"><i class="fas fa-edit"></i> Edit Profile</button>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAhWXQg6VYvz8JcrPu42Y__oGkARfi0x1U",
            authDomain: "bikeroom-765b8.firebaseapp.com",
            projectId: "bikeroom-765b8",
            appId: "1:505548164349:web:6f1111e3b71f5643ca0294"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 🔥 USER CHECK + DATA FETCH
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }

            if (user.email === "dipak@gmail.com") {
                window.location.href = "admin.html";
                return;
            }

            try {
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);

                let name = "User";
                let email = user.email;
                let phone = "N/A";

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    name = data.customerName || user.displayName || "User";
                    email = data.email || user.email;
                    phone = data.contactNumber || "N/A";
                } else if (user.displayName) {
                    name = user.displayName;
                }

                // Update UI
                document.getElementById("userName").textContent = name;
                document.getElementById("nameValue").textContent = name;
                document.getElementById("emailValue").textContent = email;
                document.getElementById("phoneValue").textContent = phone;

            } catch (err) {
                console.error(err);
            }
        });

        // Buttons
        document.getElementById('cartBtn').onclick = () => {
            window.location.href = "cart.html";
        };

        document.getElementById('editBtn').onclick = () => {
            window.location.href = "register.html?edit=true";
        };

        document.getElementById('logoutBtn').onclick = async () => {
            try {
                await signOut(auth);
                window.location.href = "login.html";
            } catch (err) {
                console.error(err);
            }
        };
    </script>

</body>

</html>
