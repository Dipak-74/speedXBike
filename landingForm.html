<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add / Update Image</title>
<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: rgba(255,255,255,0.05);
    padding: 30px 40px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    width: 350px;
    text-align: center;
}

h2 {
    margin-bottom: 20px;
    font-weight: 600;
    color: #fff;
}

input[type="file"] {
    width: 100%;
    padding: 10px;
    margin: 15px 0;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg,#ff416c,#ff4b2b);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: linear-gradient(45deg,#ff4b2b,#ff416c);
    transform: translateY(-2px);
}

#status {
    margin-top: 10px;
    font-size: 14px;
    color: #0f0;
}
</style>
</head>
<body>

<div class="container">
    <h2>Upload Image to Cloudinary</h2>
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="uploadImage()">Upload & Save</button>
    <p id="status"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔹 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAhWXQg6VYvz8JcrPu42Y__oGkARfi0x1U",
  authDomain: "bikeroom-765b8.firebaseapp.com",
  projectId: "bikeroom-765b8",
  storageBucket: "bikeroom-765b8.appspot.com",
  appId: "1:505548164349:web:6f1111e3b71f5643ca0294"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function uploadImage(){
    const file = document.getElementById("fileInput").files[0];
    const status = document.getElementById("status");
    if(!file) return alert("Select an image");

    status.innerText = "Uploading...";

    try {
        // 🔹 Cloudinary Image Upload
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", "bike_upload"); // Check your preset

        const res = await fetch("https://api.cloudinary.com/v1_1/dvxnmsryu/image/upload", {
            method: "POST",
            body: formData
        });

        if(!res.ok) throw new Error("Cloudinary upload failed");

        const data = await res.json();
        console.log("Cloudinary response:", data);

        if(!data.secure_url) throw new Error("Cloudinary returned no URL");

        const url = data.secure_url;

        // 🔹 Firestore Save / Update
        const docRef = doc(db,"animations","current");
        await setDoc(docRef, { url: url });
        status.innerText = "Image saved successfully!";
        document.getElementById("fileInput").value = "";

    } catch(err){
        console.error(err);
        status.innerText = "Upload failed! " + err.message;
    }
}

// 🔹 Fix for module + onclick
window.uploadImage = uploadImage;
</script>

</body>
</html>
