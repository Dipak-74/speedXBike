<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Details</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
}

.container {
    max-width: 800px;
    margin: 50px auto;
    padding: 20px;
    background: #1e293b;
    border-radius: 10px;
}

/* 🔥 Skeleton Loading */
.skeleton {
    background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 8px;
}

@keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
}

.skeleton-img {
    width: 100%;
    height: 300px;
}

.skeleton-text {
    height: 20px;
    margin-top: 10px;
}

img {
    width: 100%;
    border-radius: 10px;
    display: none;
}

h1 {
    margin-top: 20px;
}

p {
    line-height: 1.6;
    margin-top: 10px;
}

.back-btn {
    display: inline-block;
    margin-bottom: 20px;
    padding: 8px 15px;
    background: #3b82f6;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">
    <a href="index.html" class="back-btn">⬅ Back</a>

    <!-- 🔥 Skeleton -->
    <div id="skeleton">
        <div class="skeleton skeleton-img"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text"></div>
    </div>

    <img id="blogImage" alt="">
    <h1 id="blogTitle"></h1>
    <p id="blogDescription"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAhWXQg6VYvz8JcrPu42Y__oGkARfi0x1U",
  authDomain: "bikeroom-765b8.firebaseapp.com",
  projectId: "bikeroom-765b8",
  storageBucket: "bikeroom-765b8.appspot.com",
  messagingSenderId: "505548164349",
  appId: "1:505548164349:web:6f1111e3b71f5643ca0294"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// URL ID
const params = new URLSearchParams(window.location.search);
const blogId = params.get("id");

// Elements
const blogImage = document.getElementById("blogImage");
const blogTitle = document.getElementById("blogTitle");
const blogDescription = document.getElementById("blogDescription");
const skeleton = document.getElementById("skeleton");

// 🔥 FAST LOAD (localStorage)
const savedBlog = localStorage.getItem("selectedBlog");

if (savedBlog) {
    const blog = JSON.parse(savedBlog);

    blogImage.src = blog.imageUrl;
    blogTitle.innerText = blog.title;
    blogDescription.innerText = blog.description;

    blogImage.style.display = "block";
    skeleton.style.display = "none";
}

// 🔥 FIRESTORE FETCH (latest data)
async function loadBlog() {
    if (!blogId) {
        blogTitle.innerText = "Blog not found ❌";
        return;
    }

    try {
        const docRef = doc(db, "blogs", blogId);
        const docSnap = await getDoc(docRef);

        if (!docSnap.exists()) {
            blogTitle.innerText = "No data found ❌";
            return;
        }

        const blog = docSnap.data();

        // update UI
        blogImage.src = blog.imageUrl;
        blogTitle.innerText = blog.title;
        blogDescription.innerText = blog.description;

        blogImage.style.display = "block";
        skeleton.style.display = "none";

    } catch (error) {
        console.error("🔥 ERROR:", error);
        blogTitle.innerText = "Error loading blog ❌";
    }
}

loadBlog();
</script>

</body>
</html>
