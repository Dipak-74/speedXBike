<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Add Bike</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#1e3a8a,#2563eb);
  margin:0;
  padding:20px;
  color:white;
}

.container {
  max-width:500px;
  margin:auto;
  background: rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  backdrop-filter: blur(10px);
}

h2 { text-align:center; }

input, select {
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

button:hover { background:#16a34a; }

.delete-btn {
  background:#ef4444;
}
</style>
</head>

<body>

<div class="container">
  <h2>🚀 Add New Bike</h2>

  <input type="text" id="name" placeholder="Bike Name">
  <input type="text" id="company" placeholder="Company">
  <input type="text" id="model" placeholder="Model">
  <input type="text" id="price" placeholder="Price">
  <input type="file" id="image">

  <input type="text" id="engine" placeholder="Engine">
  <input type="text" id="cc" placeholder="CC">
  <input type="text" id="average" placeholder="Average">
  <input type="text" id="color" placeholder="Color">
  <input type="text" id="year" placeholder="Year">

  <input type="text" id="power" placeholder="Power">
  <input type="text" id="weight" placeholder="Weight">
  <input type="text" id="fuel" placeholder="Fuel Capacity">

  <input type="text" id="info1" placeholder="Feature 1">
  <input type="text" id="info2" placeholder="Feature 2">
  <input type="text" id="info3" placeholder="Feature 3">
  <input type="text" id="info4" placeholder="Feature 4">

  <select id="category">
    <option>Adventure</option>
    <option>Sports</option>
    <option>Cruiser</option>
  </select>

  <input type="text" id="badge" placeholder="Badge (New / Popular)">

  <button onclick="addBike()">Add Bike</button>

  <h2>❌ Delete Bike</h2>
  <input type="text" id="deleteName" placeholder="Enter Bike Name">
  <button class="delete-btn" onclick="deleteBike()">Delete Bike</button>

</div>

<!-- 🔥 FIREBASE + CLOUDINARY -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAhWXQg6VYvz8JcrPu42Y__oGkARfi0x1U",
  authDomain: "bikeroom-765b8.firebaseapp.com",
  projectId: "bikeroom-765b8",
  storageBucket: "bikeroom-765b8.appspot.com",
  messagingSenderId: "505548164349",
  appId: "1:505548164349:web:6f1111e3b71f5643ca0294"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 CLOUDINARY
const cloudName = "dvxnmsryu";
const uploadPreset = "bike_upload";

// 🔥 ADD BIKE
window.addBike = async () => {

  try {

    const name = document.getElementById("name").value;
    const company = document.getElementById("company").value;
    const model = document.getElementById("model").value;
    const price = document.getElementById("price").value;

    const engine = document.getElementById("engine").value;
    const cc = document.getElementById("cc").value;
    const average = document.getElementById("average").value;
    const color = document.getElementById("color").value;
    const year = document.getElementById("year").value;

    const power = document.getElementById("power").value;
    const weight = document.getElementById("weight").value;
    const fuel = document.getElementById("fuel").value;

    const info1 = document.getElementById("info1").value;
    const info2 = document.getElementById("info2").value;
    const info3 = document.getElementById("info3").value;
    const info4 = document.getElementById("info4").value;

    const category = document.getElementById("category").value;
    const badge = document.getElementById("badge").value;

    const file = document.getElementById("image").files[0];

    if (!file) {
      alert("Select Image ❌");
      return;
    }

    // 🔥 Upload Image
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", uploadPreset);

    const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (!data.secure_url) {
      alert("Image Upload Failed ❌");
      return;
    }

    // 🔥 Save to Firestore
    await addDoc(collection(db, "latestBike"), {
      name,
      company,
      model,
      price,
      image: data.secure_url,

      engine,
      cc,
      average,
      color,
      year,

      power,
      weight,
      fuel,

      info1,
      info2,
      info3,
      info4,

      category,
      badge,

      createdAt: new Date()
    });

    alert("Bike Added Successfully ✅");

  } catch (error) {
    console.error(error);
    alert("Error Occurred ❌");
  }

};

// 🔥 DELETE BIKE
window.deleteBike = async () => {

  const nameToDelete = document.getElementById("deleteName").value;

  const snapshot = await getDocs(collection(db, "latestBike"));

  snapshot.forEach(async (docItem) => {
    if (docItem.data().name === nameToDelete) {
      await deleteDoc(doc(db, "latestBike", docItem.id));
      alert("Deleted ✅");
    }
  });

};

</script>

</body>
</html>
