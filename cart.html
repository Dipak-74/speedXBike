<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 50%, #2563eb 100%);
        min-height: 100vh;
        margin: 0;
        color: #1e293b;
        padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .cart-card { max-width: 800px; margin: 0 auto; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); background: #fff; overflow: hidden; }
    .cart-header { background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 100%); padding: 2.5rem; color: #fff; text-align: center; position: relative; overflow: hidden; }
    .cart-header::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 20px 20px; opacity: 0.3; }
    .cart-header h1 { position: relative; z-index: 1; font-size: 1.8rem; margin-bottom: 0.5rem; }
    .cart-header h1 { margin-bottom: 0.5rem; }
    .cart-content { padding: 2rem; }
    .cart-items { margin-bottom: 2rem; }
    .cart-item { display: flex; align-items: center; gap: 1rem; padding: 1rem; background: #f1f5f9; border-radius: 12px; margin-bottom: 1rem; }
    .cart-item:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s; }
    .item-image { width: 100px; height: 100px; border-radius: 8px; overflow: hidden; }
    .item-image img { width: 100%; height: 100%; object-fit: cover; }
    .item-details { flex: 1; }
    .item-name { font-weight: 600; font-size: 1.2rem; margin-bottom: 0.3rem; }
    .item-price { color: #10b981; font-weight: 600; font-size: 1.1rem; }
    .item-gst { font-size: 12px; color: #64748b; margin-top: 3px; }
    .remove-btn { background: #ef4444; color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; }
    .remove-btn:hover { background: #dc2626; }
    .cart-summary { background: #f1f5f9; border-radius: 12px; padding: 1.5rem; }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 1rem; font-weight: 500; }
    .total { font-size: 1.2rem; font-weight: 600; }
    .checkout-btn { width: 100%; padding: 1rem; font-size: 1.1rem; font-weight: 600; border: none; border-radius: 12px; background: #10b981; color: #fff; cursor: pointer; margin-top: 1rem; }
    .checkout-btn:hover { background: #059669; }
    .empty-cart { text-align: center; padding: 3rem; color: #64748b; }
    .empty-cart i { font-size: 4rem; color: #2563eb; margin-bottom: 1rem; }
    .back-btn { display: flex; align-items: center; gap: 0.5rem; background: #2563eb; color: #fff; border: none; padding: 0.8rem 1.5rem; border-radius: 8px; cursor: pointer; margin: 1rem auto 0; }
    .back-btn:hover { background: #1e40af; }
    @media (max-width: 768px) { .cart-item { flex-direction: column; text-align: center; } .item-image { margin: 0 auto; } }
</style>
</head>
<body>

<div class="container">
    <div class="cart-card">
        <div class="cart-header">
            <h1>My Cart</h1>
            <p>Review your selected items</p>
        </div>

        <div class="cart-content">
            <div class="cart-items" id="cartItems"></div>

            <div class="cart-summary" id="cartSummary">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">₹0</span>
                </div>
                <div class="summary-row">
                    <span>Total GST (18%)</span>
                    <span id="tax">₹0</span>
                </div>
                <div class="summary-row total">
                    <span>Grand Total</span>
                    <span id="total">₹0</span>
                </div>
                <button class="checkout-btn" onclick="proceedToCheckout()"><i class="fas fa-shopping-bag"></i> Proceed to Checkout</button>
            </div>

            <button class="back-btn" onclick="window.location.href='HomePage.html'"><i class="fas fa-arrow-left"></i> Back to Home</button>
        </div>
    </div>
</div>

<script>
let cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
const cartContainer = document.getElementById('cartItems');
const cartSummary = document.getElementById('cartSummary');
const subtotalEl = document.getElementById('subtotal');
const taxEl = document.getElementById('tax');
const totalEl = document.getElementById('total');

function displayCartItems() {
    if(cartItems.length === 0) {
        cartContainer.innerHTML = `<div class="empty-cart">
            <i class="fas fa-shopping-cart"></i>
            <h2>Your cart is empty</h2>
            <p>Add some items to your cart to see them here</p>
        </div>`;
        cartSummary.style.display = 'none';
        return;
    }

    cartContainer.innerHTML = '';
    cartSummary.style.display = 'block';

    let subtotal = 0;
    let totalGST = 0;

    cartItems.forEach((item, index) => {
        const price = Number(item.price);       // <-- convert price to number
        const gst = price * 0.18;               // 18% GST
        subtotal += price;
        totalGST += gst;

        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
            <div class="item-image"><img src="${item.image}" alt="${item.name}"></div>
            <div class="item-details">
                <div class="item-name">${item.name}</div>
                <div class="item-price">₹${price.toLocaleString()}</div>
                <div class="item-gst">GST (18%): ₹${gst.toLocaleString()}</div>
            </div>
            <button class="remove-btn" onclick="removeItem(${index})"><i class="fas fa-trash"></i> Remove</button>
        `;
        cartContainer.appendChild(div);
    });

    const grandTotal = subtotal + totalGST;

    subtotalEl.textContent = `₹${subtotal.toLocaleString()}`;
    taxEl.textContent = `₹${totalGST.toLocaleString()}`;
    totalEl.textContent = `₹${grandTotal.toLocaleString()}`;
}

function removeItem(index) {
    cartItems.splice(index, 1);
    localStorage.setItem('cartItems', JSON.stringify(cartItems));
    displayCartItems();
}

function proceedToCheckout() {
    if(cartItems.length === 0) { alert('Your cart is empty!'); return; }
    localStorage.setItem('checkoutCart', JSON.stringify(cartItems));
    window.location.href = 'buy-now.html';
}

displayCartItems();
</script>

</body>
</html>
