<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

const firebaseConfig = {

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const bikeId = params.get("id");

let currentBike = null;

async function loadBike() {
    const docRef = doc(db, "bikes", bikeId);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
        const bike = docSnap.data();
        currentBike = bike;

        document.getElementById("bikeImage").src = bike.image;
        document.getElementById("bikeName").innerText = bike.name;

        document.getElementById("bikeSpecs").innerHTML = `
            <li><i class="fas fa-check"></i><strong>Model:</strong> ${bike.model}</li>
            <li><i class="fas fa-check"></i><strong>Company:</strong> ${bike.company}</li>
            <li><i class="fas fa-check"></i><strong>Engine:</strong> ${bike.engine}</li>
            <li><i class="fas fa-check"></i><strong>Color:</strong> ${bike.color}</li>
            <li><i class="fas fa-check"></i><strong>Average:</strong> ${bike.average}</li>
            <li><i class="fas fa-check"></i><strong>Year:</strong> ${bike.year}</li>
            <li><i class="fas fa-check"></i><strong>Price:</strong> <span class="price">₹${bike.price}</span></li>
            <li><i class="fas fa-check"></i><strong>CC:</strong> ${bike.cc}</li>
        `;

        document.getElementById("bikeInfo").innerHTML = `
            <li><i class="fas fa-check"></i>${bike.info1}</li>
            <li><i class="fas fa-check"></i>${bike.info2}</li>
            <li><i class="fas fa-check"></i>${bike.info3}</li>
            <li><i class="fas fa-check"></i>${bike.info4}</li>
        `;
        
        // Load AI and additional info immediately
        if (document.getElementById('bikeDetailsList')) {
            displayBikeDetailsList(currentBike);
        }
        if (document.getElementById('completeInfo')) {
            displayCompleteInfo(currentBike);
        }
        if (document.getElementById('aiInsights')) {
            const insights = generateAIInsights(currentBike);
            displayAIInsights(insights);
        }
        if (document.getElementById('aiRecommendations')) {
            loadAIRecommendations(currentBike);
        }
    } else {
        alert("Bike not found ❌");
    }
}

loadBike();

// 🔥 ADD TO CART FUNCTIONALITY
const addCartBtn = document.querySelector('.add-cart');

addCartBtn.addEventListener('click', () => {
  if (!currentBike) return;

  // Get existing cart items
  let cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];

  // Check if already in cart
  const exists = cartItems.find(item => item.name === currentBike.name);
  if (exists) {
    alert("This bike is already in your cart! ✅");
    // Change button to Go to Cart anyway
    addCartBtn.innerHTML = '<i class="fas fa-shopping-cart"></i> Go to Cart';
    addCartBtn.onclick = () => window.location.href = 'cart.html';
    return;
  }

  // Add bike to cart
  cartItems.push({
    name: currentBike.name,
    price: currentBike.price,
    image: currentBike.image
  });

  localStorage.setItem('cartItems', JSON.stringify(cartItems));

  // Change button to Go to Cart
  addCartBtn.innerHTML = '<i class="fas fa-shopping-cart"></i> Go to Cart';
  addCartBtn.onclick = () => window.location.href = 'cart.html';

  alert("Bike added to cart successfully! 🛒");
});

// 🤖 AI FUNCTIONS

// Generate AI Insights based on bike data
function generateAIInsights(bike) {
  const insights = [];
  
  // Price Analysis
  const price = parseInt(String(bike.price).replace(/[^0-9]/g, '') || 0);
  if (price > 0) {
    if (price < 100000) {
      insights.push({
        title: "💰 Value for Money",
        text: "This bike offers excellent value in the budget segment. Great choice for daily commuting with low maintenance costs."
      });


      
    } else if (price < 200000) {
      insights.push({
        title: "💰 Mid-Range Champion",
        text: "Positioned perfectly in the mid-range segment, offering premium features without breaking the bank."
      });
    } else {
      insights.push({
        title: "💰 Premium Segment",
        text: "A premium offering with top-tier features. Ideal for enthusiasts seeking performance and style."
      });
    }
  }
  
  // Engine Analysis
  const cc = parseInt(bike.cc || 0);
  if (cc > 0) {
    if (cc < 150) {
      insights.push({
        title: "⚡ Efficiency Focused",
        text: `The ${cc}cc engine prioritizes fuel efficiency and easy handling. Perfect for city rides and new riders.`
      });
    } else if (cc < 250) {
      insights.push({
        title: "⚡ Balanced Performance",
        text: `The ${cc}cc engine strikes a perfect balance between power and efficiency. Suitable for both city and highway rides.`
      });
    } else {
      insights.push({
        title: "⚡ Power Packed",
        text: `The ${cc}cc engine delivers thrilling performance. Built for speed enthusiasts and long highway cruises.`
      });
    }
  }
  
  // Mileage Analysis
  if (bike.average) {
    const mileage = parseFloat(bike.average);
    if (mileage > 50) {
      insights.push({
        title: "⛽ Fuel Efficient",
        text: `With ${bike.average} mileage, this bike is extremely fuel-efficient. Save significantly on fuel costs!`
      });
    }
  }
  
  // Year Analysis
  const year = parseInt(bike.year);
  if (year >= 2024) {
    insights.push({
      title: "🆕 Latest Model",
      text: "Being a latest model, you get the most recent technology, safety features, and design language."
    });
  }
  
  // Use Case
  insights.push({
    title: "🎯 Best For",
    text: generateBestForText(bike)
  });
  
  return insights;
}

function generateBestForText(bike) {
  const cc = parseInt(bike.cc || 0);
  const texts = [];
  
  if (cc < 150) {
    texts.push("daily commuting", "new riders", "fuel economy");
  } else if (cc < 250) {
    texts.push("weekend rides", "city-highway mix", "style conscious riders");
  } else {
    texts.push("highway cruising", "performance enthusiasts", "long tours");
  }
  
  return texts.join(" • ");
}

// Display AI Insights
function displayAIInsights(insights) {
  const container = document.getElementById('aiInsights');
  container.innerHTML = insights.map(insight => `
    <div class="ai-insight-item">
      <h4>${insight.title}</h4>
      <p>${insight.text}</p>
    </div>
  `).join('');
}

  input.value = '';
  
  // Generate AI response instantly (no delay)
  const response = generateAIResponse(message, currentBike);
  addChatMessage(response, 'bot');
}

function addChatMessage(text, sender) {
  const container = document.getElementById('aiChatMessages');
  const messageDiv = document.createElement('div');
  messageDiv.className = `ai-message ${sender}`;
  messageDiv.textContent = text;
  container.appendChild(messageDiv);
  container.scrollTop = container.scrollHeight;
}

function generateAIResponse(query, bike) {
  query = query.toLowerCase();
  
  if (query.includes('price') || query.includes('cost') || query.includes('kitni')) {
    return `The ${bike.name} is priced at ₹${bike.price}. This is ${getPriceOpinion(bike.price)} for a bike with these features.`;
  }
  
  if (query.includes('mileage') || query.includes('average') || query.includes('kitna deti')) {
    return `The ${bike.name} delivers approximately ${bike.average}. This makes it ${getMileageOpinion(bike.average)}.`;
  }
  
  if (query.includes('engine') || query.includes('cc') || query.includes('power')) {
    return `The ${bike.name} comes with a ${bike.cc}cc ${bike.engine} engine. It offers ${getEngineOpinion(bike.cc)}.`;
  }
  
  if (query.includes('color') || query.includes('colour')) {
    return `The ${bike.name} is available in ${bike.color}. It's a popular choice among buyers!`;
  }
  
  if (query.includes('compare') || query.includes('better')) {
    return `The ${bike.name} stands out with its ${bike.cc}cc engine and ${bike.average} mileage. It's best suited for ${getBestFor(bike)}.`;
  }
  
  if (query.includes('buy') || query.includes('purchase') || query.includes('leni')) {
    return `The ${bike.name} is an excellent choice! With its ${bike.cc}cc engine and ₹${bike.price} price point, it offers great value. Would you like to add it to cart?`;
  }
  
  if (query.includes('feature') || query.includes('spec')) {
    return `Key features of ${bike.name}: ${bike.cc}cc engine, ${bike.average} mileage, ${bike.color} color, ${bike.year} model. ${bike.info1}`;
  }
  
  if (query.includes('hello') || query.includes('hi') || query.includes('namaste')) {
    return `Hello! I'm here to help you with the ${bike.name}. Ask me about price, mileage, features, or anything else!`;
  }
  
  return `That's an interesting question about the ${bike.name}! Based on its ${bike.cc}cc engine and features, I'd say it's a solid choice for ${getBestFor(bike)}. What specific aspect would you like to know more about?`;
}

function getPriceOpinion(price) {
  const p = parseInt(String(price).replace(/[^0-9]/g, '') || 0);
  if (p < 100000) return "very competitively priced";
  if (p < 200000) return "reasonably priced";
  return "a premium offering";
}

function getMileageOpinion(average) {
  const m = parseFloat(average);
  if (m > 50) return "highly fuel efficient";
  if (m > 40) return "decently fuel efficient";
  return "average on fuel efficiency";
}

function getEngineOpinion(cc) {
  const c = parseInt(cc);
  if (c < 150) return "smooth and efficient performance for city rides";
  if (c < 250) return "a perfect balance of power and efficiency";
  return "thrilling performance for highway cruising";
}

function getBestFor(bike) {
  const cc = parseInt(bike.cc || 0);
  if (cc < 150) return "daily city commuting";
  if (cc < 250) return "mixed city and highway usage";
  return "highway touring and performance riding";
}

async function loadAIRecommendations(currentBike) {
  try {
    const { collection, query, where, getDocs } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    
    // Get bikes with similar CC range
    const cc = parseInt(currentBike.cc || 0);

    const q = query(bikesRef);
    const snapshot = await getDocs(q);
    
    const similarBikes = [];
    snapshot.forEach(doc => {
      const bike = doc.data();
      if (bike.name !== currentBike.name) {
        const bikeCC = parseInt(bike.cc || 0);
        const ccDiff = Math.abs(bikeCC - cc);
        const matchScore = Math.max(0, 100 - ccDiff);
        
        if (matchScore > 50) {
          similarBikes.push({
            id: doc.id,
            ...bike,
            matchScore: matchScore
          });
        }
      }
    });
    
    // Sort by match score and take top 3
    similarBikes.sort((a, b) => b.matchScore - a.matchScore);
    const topRecommendations = similarBikes.slice(0, 3);
    
    displayAIRecommendations(topRecommendations);
  } catch (error) {
    console.error('Error loading AI recommendations:', error);
    document.getElementById('aiRecommendations').innerHTML = `
      <div class="ai-insight-item">
        <p>Unable to load recommendations. Please try again later.</p>
      </div>
    `;
  }
}

function displayAIRecommendations(bikes) {
  const container = document.getElementById('aiRecommendations');
  
  if (bikes.length === 0) {
    container.innerHTML = `
      <div class="ai-insight-item">
        <p>No similar bikes found. This bike is unique in its category!</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = bikes.map(bike => `
    <div class="ai-recommendation-card" onclick="window.location.href='details.html?id=${bike.id}'">
      <img src="${bike.image}" alt="${bike.name}">

      </div>

  `).join('');
}
